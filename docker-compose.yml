version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: forexcomp
      POSTGRES_USER: forexcomp
      POSTGRES_PASSWORD: forexcomp_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations/all_migrations.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://forexcomp:forexcomp_dev@postgres:5432/forexcomp
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/src:/app/src

volumes:
  pgdata:
